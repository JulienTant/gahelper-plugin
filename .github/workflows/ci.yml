name: ci
on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  plugin-ci:
    uses: mattermost/actions-workflows/.github/workflows/plugin-ci.yml@main
    secrets: inherit

  release:
    needs: plugin-ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      - name: Publish "latest" release (tracks master)
        if: github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # GITHUB_TOKEN can't delete releases/tags ("Resource not accessible by
          # integration"), so this edits the existing "latest" release in place
          # instead of deleting and recreating it. The asset is copied to a fixed
          # filename (build tarballs embed a commit hash, so --clobber wouldn't
          # match a differently-named previous upload) to avoid stale assets
          # piling up on every master push.
          asset="dist/com.mattermost.gahelper-latest.tar.gz"
          cp dist/*.tar.gz "$asset"
          title="Latest build ($(echo "$GITHUB_SHA" | cut -c1-7))"
          if gh release view latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit latest --repo "$GITHUB_REPOSITORY" --title "$title"
            gh release upload latest "$asset" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create latest "$asset" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "$title" \
              --notes "" \
              --prerelease \
              --latest=false
          fi

      - name: Publish release for version tag
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/*.tar.gz \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --notes "" \
            || gh release upload "$GITHUB_REF_NAME" dist/*.tar.gz --repo "$GITHUB_REPOSITORY" --clobber
